name: Found a bug?
description: Report your bug here.
labels: ["bug", "triage"]
body:

  - type: markdown
    attributes:
      value: |
        #### Before you get started
        * Check to make sure someone hasn't already opened a similar [issue](https://github.com/weaviate/weaviate-io/issues).
        * Read the [contributing guide](https://weaviate.io/developers/contributor-guide).

  - type: textarea
    id: issue_body
    attributes:
      label: Describe your issue
      description: |
        - What was the expected behavior? How it is behaving? Can you replicate it in latest version? Paste logs, context information (client version? environment variables?) or instruction on how to reproduce this issue here.
    validations:
      required: true

  - type: input
    id: server_version
    attributes:
      label: Server Version
      description: |
        - What Weaviate Version are you running?
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: This project has a Code of Conduct that all participants are expected to understand and follow.
      options:
        - label: I have read and agree to the Weaviate's [Contributor Guide](https://weaviate.io/developers/contributor-guide) and [Code of Conduct](https://weaviate.io/service/code-of-conduct)
          required: true



